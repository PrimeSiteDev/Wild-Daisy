<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild Daisy | Handmade by Karen Savage</title>

<style>
  :root {
    --bg: #faf7f2;
    --accent: #c7a27c;
    --accent-dark: #b08c68;
    --text-main: #333;
    --text-muted: #777;
  }

  * {
    box-sizing: border-box;
  }

  body {
    margin: 0;
    font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text-main);
  }

  /* Header */

  header {
    background: #fff;
    padding: 18px 32px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 16px;
    border-bottom: 1px solid #e4ddd4;
  }

  .logo {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    overflow: hidden;
    flex-shrink: 0;
    border: 2px solid #f3e6d6;
  }

  .logo img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .brand-text h1 {
    margin: 0;
    font-size: 2.1rem;
    letter-spacing: 2px;
  }

  .brand-text p {
    margin: 2px 0 0;
    font-size: 0.9rem;
    color: var(--text-muted);
  }

  /* Nav */

  nav {
    background: #f3ece3;
    text-align: center;
    padding: 10px 16px;
  }

  nav a {
    margin: 0 18px;
    text-decoration: none;
    color: #444;
    font-weight: 600;
    font-size: 0.95rem;
  }

  nav a:hover {
    color: var(--accent-dark);
  }

  /* Hero */

  .hero {
    background: url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6")
                no-repeat center/cover;
    padding: 90px 20px;
    text-align: center;
    color: #fff;
    position: relative;
  }

  .hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.35);
  }

  .hero-inner {
    position: relative;
    max-width: 700px;
    margin: 0 auto;
  }

  .hero h2 {
    font-size: 2.6rem;
    margin-bottom: 10px;
  }

  .hero p {
    font-size: 1.05rem;
    margin-bottom: 18px;
  }

  .hero span {
    display: inline-block;
    background: rgba(250,247,242,0.9);
    color: #333;
    padding: 6px 14px;
    border-radius: 999px;
    font-size: 0.85rem;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  /* Main layout */

  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 40px 16px 60px;
  }

  /* About */

  .about {
    display: grid;
    grid-template-columns: minmax(0, 2fr) minmax(0, 1.5fr);
    gap: 30px;
    margin-bottom: 50px;
  }

  .about-text h3 {
    font-size: 1.6rem;
    margin-top: 0;
    margin-bottom: 10px;
  }

  .about-text p {
    margin: 6px 0;
    line-height: 1.6;
  }

  .about-highlight {
    margin-top: 10px;
    font-size: 0.95rem;
    color: var(--text-muted);
  }

  .about-card {
    background: #fff;
    border-radius: 14px;
    padding: 18px 20px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
  }

  .about-card h4 {
    margin: 0 0 8px;
    font-size: 1.1rem;
  }

  .about-card p {
    margin: 4px 0;
    font-size: 0.95rem;
  }

  /* Products */

  .section-title {
    text-align: center;
    margin-bottom: 26px;
  }

  .section-title h3 {
    margin: 0;
    font-size: 1.7rem;
  }

  .section-title p {
    margin: 6px 0 0;
    color: var(--text-muted);
    font-size: 0.95rem;
  }

  .products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(230px, 1fr));
    gap: 22px;
  }

  .product {
    background: #fff;
    border-radius: 14px;
    padding: 16px 16px 18px;
    box-shadow: 0 4px 14px rgba(0,0,0,0.06);
    display: flex;
    flex-direction: column;
    height: 100%;
  }

  .product img {
    width: 100%;
    border-radius: 10px;
    margin-bottom: 12px;
    object-fit: cover;
    height: 180px;
  }

  .product h4 {
    margin: 0 0 4px;
    font
